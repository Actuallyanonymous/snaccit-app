<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>Redirecting to Payment...</title>
  <style>
    body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; background: #f5f5f5; }
    .loader { text-align: center; color: #555; }
    .spinner { border: 4px solid #e0e0e0; border-top: 4px solid #6c47ff; border-radius: 50%; width: 40px; height: 40px; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p>Redirecting to payment...</p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const payUrl = params.get('url');
    if (payUrl && payUrl.startsWith('https://')) {
      window.location.href = payUrl;
    } else {
      document.querySelector('.loader p').textContent = 'Invalid payment link.';
    }
  </script>
</body>
</html>
