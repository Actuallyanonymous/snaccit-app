<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Returning to Snaccit...</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, sans-serif;
            background: #f5f5f5;
        }

        .container {
            text-align: center;
            padding: 24px;
        }

        .spinner {
            border: 4px solid #e0e0e0;
            border-top: 4px solid #6c47ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        p {
            color: #555;
            margin: 8px 0;
        }

        .btn {
            display: inline-block;
            margin-top: 16px;
            padding: 12px 32px;
            background: #6c47ff;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
        }

        .btn:active {
            background: #5535cc;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="spinner"></div>
        <p>Returning to Snaccit App...</p>
        <p id="fallback" style="display:none; color:#999; font-size:14px;">If the app didn't open automatically:</p>
        <a id="fallbackBtn" class="btn" style="display:none;" href="#">Open Snaccit App</a>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('orderId') || '';
        const deepLink = 'snaccit://payment-status?orderId=' + encodeURIComponent(orderId);

        // Try to open the app immediately
        window.location.href = deepLink;

        // After 2 seconds, if we're still here, show the fallback button
        setTimeout(function () {
            document.getElementById('fallback').style.display = 'block';
            var btn = document.getElementById('fallbackBtn');
            btn.style.display = 'inline-block';
            btn.href = deepLink;
        }, 2000);
    </script>
</body>

</html>
